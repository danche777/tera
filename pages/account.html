<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TErA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../static/css/main.css">
<!-- <link rel="svg" href="main.svg"> -->
</head>

<body>
    <header>
        <a href="/"><div class="header_item"><span>TErA</span></div></a>
        <div>
            <div class="header_item"></div>
            <div class="header_item" id="logout"><button onclick="logout()" class="logout_btn">logout</button></div>
        </div>
    </header>
    <div class="account_body">
            <h1>Account</h1>
                <img src="../static/images/profile.png" class="account_profile_image">
                <div class="account_info">
                    <p>Username: <span id="account_username" style="font-size: 20px; font-weight: bold;">{{ posts[0]['username'] }}</span></p>
                </div>
                <div class="account_users_posts">
                    <h2>Posts</h2>
                    <div class="account_posts">
                        {% for item in posts %}
                        <div class="item_forum" id="{{ item['id'] }}">
                            <div class="content_item_forum">{{ item["content"] }}</div>
                            <div class="objects_item_forun">
                                <div style=" display: flex; flex-direction: row; gap: 20px;">
                                    <button class="upvoute_button" id="upvoute" name="{{ item['id'] }}">
                                        <img src="../static/svg/arrow-up-svgrepo-com.svg" alt="arrow-up" style="width: 100%;">
                                    </button>
                                    <div class="forum_reacts_count">{{ item["likes_count"] }}</div>
                                    <button  class="downvoute_button" id="downvoute" name="{{ item['id'] }}">
                                        <img src="../static/svg/arrow-down-svgrepo-com.svg" alt="arrow-down" style="width: 100%;">
                                    </button>
                                    <div class="forum_reacts_count">{{ item["dislikes_count"] }}</div>
                                </div>
                                <div style=" display: flex; flex-direction: row; gap: 40px">
                                    <button class="account_delete_button">delete</button>
                                    <button class="comments_button" id="{{ item['id'] }}">comments</button>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
    </div>
<script src="../static/javascript/account.js"></script>
</body>
</html>
