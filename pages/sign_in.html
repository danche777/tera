<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Sign in Tera</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../static/css/main.css">
<!-- <link rel="svg" href="main.svg"> -->
</head>

<body>
    
    <header>
        <a href="main.html"><div class="header-item"><span>TErA</span></div></a>
        <div>
            <div class="header-item"></div>
            <div class="header-item"></div>
        </div>
    </header>

    <div class="input_body">
        <div class="input_container">
            <input type="text" id="username" placeholder="username">
            <div class="password-container">
                <input type="password" id="password" placeholder="password">
                <div class="eye-box">
                    <button type="button" class="eye-btn" id="eye-btn">👁</button>
                </div>
            </div>
            <button class="confirm_btn">Confirm</button>
            <div style="display: flex; flex-wrap: nowrap;"><div style="margin-top: 9px; padding: 4px 4px 8px 4px;">or</div><a href="sign_up.html"><div class="sign_up_link">sign up</div></a></div>
        </div>
        
    </div>

<svg width="0" height="0">
    <filter id="liquid">
        <feTurbulence
        type="fractalNoise"
        baseFrequency="0.015"
        numOctaves="3"
        seed="1"
        >
        <animate
            attributeName="baseFrequency"
            dur="4s"
            values="0.012;0.018;0.012"
            repeatCount="indefinite"
        />
        </feTurbulence>

        <feDisplacementMap
        in="SourceGraphic"
        scale="15"
        />
    </filter>
</svg>
<script src="../static/javascript/main.js"></script>
</body>
</html>
