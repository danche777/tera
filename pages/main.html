<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TErA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/css/main.css">
<!-- <link rel="svg" href="main.svg"> -->
</head>

<body>
    <header>
        <a href="/"><div class="header_item"><span>TErA</span></div></a>
        <div>
            <div class="header_item" id="account"><button onclick="account()" class="account_btn">account</button></div>
        </div>
    </header>

    <div class="body_main">
        <div class="container" id="container">
            <div class="indicator" id="indicator"></div>
            <div class="card" id="start"><span>START</span></div>
            <a href="/info" class="card" id="info"><span>INFO</span></a>
<!--            <div class="card" id="signin"><span>SIGN IN</span></div>-->
<!--            <div class="card" id="block4"><span>Block 4</span></div>-->
        </div>
    </div>



<svg width="0" height="0">
    <filter id="liquid">
        <feTurbulence
        type="fractalNoise"
        baseFrequency="0.015"
        numOctaves="3"
        seed="1"
        >
        <animate
            attributeName="baseFrequency"
            dur="4s"
            values="0.012;0.018;0.012"
            repeatCount="indefinite"
        />
        </feTurbulence>

        <feDisplacementMap
        in="SourceGraphic"
        scale="15"
        />
    </filter>
</svg>
<script src="/static/javascript/main.js"></script>
</body>
</html>
