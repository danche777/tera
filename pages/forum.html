<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Forum - TErA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../static/css/main.css">
</head>
<body>
    <header>
        <a href="/"><div class="header_item"><span>TErA</span></div></a>
        <div>
            <div class="strt_post_button">NeW poSt beta</div>
        </div>
    </header>

    <div class="body_forum">
        <div class="container_forum">
            {% for item in posts %}
            <div class="item_forum" id="{{ item['id'] }}">
                <div class="content_item_forum">{{ item["content"] }}</div>
                <div class="objects_item_forun">
                    <div style=" display: flex; flex-direction: row; gap: 20px;">
                        <input type="radio" class="hidden_radio" id="option1" name="{{ item['id'] }}">
                        <label for="option1" class="radio_button"></label>
                        <input type="radio" class="hidden_radio" id="option2" name="{{ item['id'] }}">
                        <label for="option2" class="radio_button" style="rotate: 180deg;"></label>
                    </div>
                    <div style=" display: flex; flex-direction: row; gap: 40px">
                        <div class="username">{{ item["username"] }}</div>
                        <button class="comments_button" id="{{ item['id'] }}">comments</button>
                    </div>
                </div>
            </div>
            {% endfor %}
    </div>
<script src="../static/javascript/forum.js"></script>
</body>
</html>
